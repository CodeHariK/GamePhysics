name: Deploy Physics to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'physics/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: physics/package-lock.json

      - name: Install Dependencies 🔧
        run: npm ci
        working-directory: physics

      - name: Build 🏗️
        run: npm run build
        working-directory: physics

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: physics/dist
          branch: gh-pages
